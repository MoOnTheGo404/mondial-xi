name: Data refresh

# The open dataset (martj42/international_results) is updated as matches
# finish. This job re-downloads it, rebuilds the processed data, retrains and
# re-evaluates the models, refreshes the README metrics, and commits any
# changed artifacts. It can only pull what the upstream open dataset has
# published — it never fabricates a result.
#
# Cadence: DAILY. Each data change triggers Render's autoDeploy (a full model
# retrain per service), so cadence is directly build-minutes spend. During the
# 2026 World Cup a 30-min cadence burned the entire Render deploy budget —
# don't raise it above daily unless a tournament is live, and if you do, lower
# it back afterwards. For a one-off refresh use the "Run workflow" button
# (workflow_dispatch).

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily, after most fixtures conclude
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Refresh data + retrain + re-evaluate
        run: |
          uv run python -m kickoff_ml.ingestion.download --force
          uv run python -m kickoff_ml.ingestion.wikipedia
          uv run python -m kickoff_ml.ingestion.build
          uv run python -m kickoff_ml.models.players
          uv run python -m kickoff_ml.evaluation.run
          uv run python scripts/calibrate_aging.py
          uv run python scripts/update_readme_metrics.py

      - name: Sanity check (leakage + metrics tests)
        run: uv run pytest tests/unit/ml -q

      - name: Commit refreshed metrics if changed
        run: |
          git config user.name "mondial-xi-bot"
          git config user.email "actions@github.com"
          git add data/manifests ml/artifacts README.md
          if git diff --cached --quiet; then
            echo "No changes — dataset unchanged since last run."
          else
            CUTOFF=$(python -c "import json;print(json.load(open('ml/artifacts/metrics.json'))['data_cutoff'])")
            git commit -m "chore(data): daily refresh — cutoff ${CUTOFF} [skip ci]"
            git push
          fi

      # No deploy hook: render.yaml sets autoDeploy, so the data commit above
      # already triggers exactly one rebuild per service. A deploy hook on top
      # of that DOUBLES the API builds (each one retrains the models) — that
      # duplication is what exhausted the Render deploy budget during the WC.
      # If you ever disable autoDeploy, re-add the hook step here instead.
