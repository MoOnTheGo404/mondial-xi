name: Data refresh

# The open dataset (martj42/international_results) is updated through the day as
# matches finish. This job re-downloads it, rebuilds the processed data,
# retrains and re-evaluates the models, refreshes the README metrics, commits
# any changed artifacts, and (if RENDER_DEPLOY_HOOK is set) redeploys the live
# site so a freshly-finished result appears within the half-hour. It can only
# pull what the upstream open dataset has published — it never fabricates a
# result. Runs every 30 minutes; the commit/redeploy steps are no-ops when the
# dataset is unchanged, so quiet periods cost almost nothing.
#
# Note: GitHub may delay or drop very high-frequency scheduled runs under load;
# 30 min is the practical floor for a reliable cadence.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Refresh data + retrain + re-evaluate
        run: |
          uv run python -m kickoff_ml.ingestion.download --force
          uv run python -m kickoff_ml.ingestion.wikipedia
          uv run python -m kickoff_ml.ingestion.build
          uv run python -m kickoff_ml.models.players
          uv run python -m kickoff_ml.evaluation.run
          uv run python scripts/calibrate_aging.py
          uv run python scripts/update_readme_metrics.py

      - name: Sanity check (leakage + metrics tests)
        run: uv run pytest tests/unit/ml -q

      - name: Commit refreshed metrics if changed
        run: |
          git config user.name "mondial-xi-bot"
          git config user.email "actions@github.com"
          git add data/manifests ml/artifacts README.md
          if git diff --cached --quiet; then
            echo "No changes — dataset unchanged since last run."
          else
            CUTOFF=$(python -c "import json;print(json.load(open('ml/artifacts/metrics.json'))['data_cutoff'])")
            git commit -m "chore(data): daily refresh — cutoff ${CUTOFF} [skip ci]"
            git push
          fi

      # Optional: trigger a Render redeploy so the live site rebuilds with the
      # fresh dataset. Add a RENDER_DEPLOY_HOOK repo secret (Render → service →
      # Settings → Deploy Hook) to enable; skipped silently if unset.
      - name: Trigger Render redeploy
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK" && echo "Render redeploy triggered"
