name: Daily data refresh

# The open dataset (martj42/international_results) is updated daily as matches
# finish. This job re-downloads it, rebuilds the processed data, retrains and
# re-evaluates the models, refreshes the README metrics, and commits any
# changed artifacts so the repo (and any deployment that tracks it) stays
# current. Runs after the day's games are typically complete.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Refresh data + retrain + re-evaluate
        run: |
          uv run python -m kickoff_ml.ingestion.download --force
          uv run python -m kickoff_ml.ingestion.build
          uv run python -m kickoff_ml.models.players
          uv run python -m kickoff_ml.evaluation.run
          uv run python scripts/calibrate_aging.py
          uv run python scripts/update_readme_metrics.py

      - name: Sanity check (leakage + metrics tests)
        run: uv run pytest tests/unit/ml -q

      - name: Commit refreshed artifacts if changed
        run: |
          git config user.name "kickoff-atlas-bot"
          git config user.email "actions@github.com"
          git add data/manifests ml/artifacts README.md
          if git diff --cached --quiet; then
            echo "No changes — dataset unchanged since last run."
          else
            CUTOFF=$(python -c "import json;print(json.load(open('ml/artifacts/metrics.json'))['data_cutoff'])")
            git commit -m "chore(data): daily refresh — cutoff ${CUTOFF} [skip ci]"
            git push
          fi
